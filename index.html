<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mr. Mandoriya | Cinematic Wedding Videographer</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  :root {
    --cyan: #00f5ff;
    --magenta: #ff00aa;
    --gold: #ffd700;
    --dark: #050510;
    --darker: #020208;
    --glass: rgba(0, 245, 255, 0.05);
    --glass-border: rgba(0, 245, 255, 0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Rajdhani', sans-serif;
    background: var(--dark);
    color: #e0e0ff;
    overflow-x: hidden;
    cursor: none;
  }

  /* Custom Cursor */
  .cursor {
    width: 20px; height: 20px;
    border: 2px solid var(--cyan);
    border-radius: 50%;
    position: fixed;
    pointer-events: none;
    z-index: 99999;
    transition: transform 0.1s, border-color 0.3s;
    mix-blend-mode: difference;
  }
  .cursor-dot {
    width: 4px; height: 4px;
    background: var(--cyan);
    border-radius: 50%;
    position: fixed;
    pointer-events: none;
    z-index: 99999;
  }

  /* Scanline overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,245,255,0.015) 2px,
      rgba(0,245,255,0.015) 4px
    );
    pointer-events: none;
    z-index: 9998;
  }

  /* Grid background */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,245,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,245,255,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
    z-index: 0;
  }

  /* NAV */
  nav {
    position: fixed;
    top: 0; width: 100%;
    padding: 20px 60px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 1000;
    background: linear-gradient(180deg, rgba(2,2,8,0.95) 0%, transparent 100%);
    border-bottom: 1px solid rgba(0,245,255,0.1);
    backdrop-filter: blur(10px);
  }

  .nav-logo {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.4rem;
    font-weight: 900;
    color: var(--cyan);
    letter-spacing: 3px;
    text-shadow: 0 0 20px var(--cyan), 0 0 40px rgba(0,245,255,0.3);
  }

  .nav-links {
    display: flex;
    gap: 40px;
    list-style: none;
  }

  .nav-links a {
    color: #a0c0ff;
    text-decoration: none;
    font-family: 'Orbitron', sans-serif;
    font-size: 0.7rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    transition: color 0.3s, text-shadow 0.3s;
    position: relative;
  }

  .nav-links a::after {
    content: '';
    position: absolute;
    bottom: -4px; left: 0;
    width: 0; height: 1px;
    background: var(--cyan);
    transition: width 0.3s;
    box-shadow: 0 0 8px var(--cyan);
  }

  .nav-links a:hover {
    color: var(--cyan);
    text-shadow: 0 0 15px var(--cyan);
  }
  .nav-links a:hover::after { width: 100%; }

  /* HERO */
  #hero {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    z-index: 1;
  }

  .hero-bg {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 50% 50%, rgba(0,245,255,0.07) 0%, transparent 70%),
      radial-gradient(ellipse 40% 40% at 80% 20%, rgba(255,0,170,0.08) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 20% 80%, rgba(0,100,255,0.06) 0%, transparent 60%),
      var(--darker);
  }

  /* Floating orbs */
  .orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(60px);
    animation: orbFloat 8s ease-in-out infinite;
  }
  .orb1 { width: 400px; height: 400px; background: rgba(0,245,255,0.08); top: 10%; left: -10%; animation-delay: 0s; }
  .orb2 { width: 300px; height: 300px; background: rgba(255,0,170,0.06); bottom: 10%; right: -5%; animation-delay: 3s; }
  .orb3 { width: 200px; height: 200px; background: rgba(255,215,0,0.05); top: 60%; left: 30%; animation-delay: 5s; }

  @keyframes orbFloat {
    0%, 100% { transform: translateY(0) scale(1); }
    50% { transform: translateY(-30px) scale(1.05); }
  }

  .hero-content {
    text-align: center;
    z-index: 2;
    position: relative;
    padding: 0 20px;
  }

  .hero-eyebrow {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.75rem;
    letter-spacing: 8px;
    color: var(--cyan);
    text-transform: uppercase;
    margin-bottom: 20px;
    opacity: 0;
    animation: fadeUp 1s ease forwards 0.3s;
  }

  .hero-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(4rem, 12vw, 10rem);
    line-height: 0.9;
    letter-spacing: 4px;
    margin-bottom: 20px;
    opacity: 0;
    animation: fadeUp 1s ease forwards 0.6s;
  }

  .hero-name span.glitch {
    display: block;
    color: transparent;
    -webkit-text-stroke: 2px var(--cyan);
    text-shadow:
      3px 0 var(--magenta),
      -3px 0 var(--cyan);
    animation: glitch 3s infinite;
  }

  .hero-name span.solid {
    display: block;
    color: #fff;
    text-shadow: 0 0 40px rgba(255,255,255,0.3);
  }

  @keyframes glitch {
    0%, 90%, 100% { text-shadow: 3px 0 var(--magenta), -3px 0 var(--cyan); clip-path: none; }
    92% { text-shadow: -3px 0 var(--magenta), 3px 0 var(--cyan); transform: translate(2px, 0); }
    94% { text-shadow: 3px 0 var(--magenta), -3px 0 var(--cyan); transform: translate(-2px, 0); }
    96% { clip-path: polygon(0 20%, 100% 20%, 100% 40%, 0 40%); transform: translate(4px, 0); }
    98% { clip-path: none; transform: translate(0); }
  }

  .hero-tagline {
    font-size: 1.4rem;
    font-weight: 300;
    color: rgba(200,220,255,0.8);
    letter-spacing: 4px;
    margin-bottom: 50px;
    opacity: 0;
    animation: fadeUp 1s ease forwards 0.9s;
  }

  .hero-tagline em {
    color: var(--gold);
    font-style: normal;
    font-weight: 600;
  }

  .hero-cta {
    display: flex;
    gap: 20px;
    justify-content: center;
    flex-wrap: wrap;
    opacity: 0;
    animation: fadeUp 1s ease forwards 1.2s;
  }

  .btn-primary {
    padding: 16px 40px;
    background: transparent;
    border: 2px solid var(--cyan);
    color: var(--cyan);
    font-family: 'Orbitron', sans-serif;
    font-size: 0.75rem;
    letter-spacing: 4px;
    text-transform: uppercase;
    text-decoration: none;
    cursor: none;
    position: relative;
    overflow: hidden;
    transition: color 0.3s;
    clip-path: polygon(10px 0, 100% 0, calc(100% - 10px) 100%, 0 100%);
  }

  .btn-primary::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--cyan);
    transform: translateX(-100%);
    transition: transform 0.3s;
    z-index: -1;
  }

  .btn-primary:hover { color: var(--dark); }
  .btn-primary:hover::before { transform: translateX(0); }

  .btn-secondary {
    padding: 16px 40px;
    background: transparent;
    border: 2px solid var(--magenta);
    color: var(--magenta);
    font-family: 'Orbitron', sans-serif;
    font-size: 0.75rem;
    letter-spacing: 4px;
    text-transform: uppercase;
    text-decoration: none;
    cursor: none;
    position: relative;
    overflow: hidden;
    transition: color 0.3s;
    clip-path: polygon(10px 0, 100% 0, calc(100% - 10px) 100%, 0 100%);
  }

  .btn-secondary::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--magenta);
    transform: translateX(-100%);
    transition: transform 0.3s;
    z-index: -1;
  }

  .btn-secondary:hover { color: #fff; }
  .btn-secondary:hover::before { transform: translateX(0); }

  .scroll-indicator {
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    color: rgba(0,245,255,0.5);
    font-family: 'Orbitron', sans-serif;
    font-size: 0.6rem;
    letter-spacing: 3px;
    animation: bounce 2s infinite;
  }

  .scroll-line {
    width: 1px;
    height: 50px;
    background: linear-gradient(180deg, var(--cyan), transparent);
  }

  @keyframes bounce {
    0%, 100% { transform: translateX(-50%) translateY(0); }
    50% { transform: translateX(-50%) translateY(8px); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* SECTIONS COMMON */
  section {
    position: relative;
    z-index: 1;
    padding: 120px 60px;
  }

  .section-label {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.65rem;
    letter-spacing: 8px;
    color: var(--cyan);
    text-transform: uppercase;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .section-label::before {
    content: '';
    width: 40px;
    height: 1px;
    background: var(--cyan);
    box-shadow: 0 0 8px var(--cyan);
  }

  .section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2.5rem, 6vw, 5rem);
    letter-spacing: 3px;
    line-height: 1;
    margin-bottom: 60px;
  }

  /* ABOUT */
  #about {
    background: linear-gradient(135deg, rgba(0,245,255,0.03) 0%, transparent 50%, rgba(255,0,170,0.02) 100%);
    border-top: 1px solid rgba(0,245,255,0.1);
    border-bottom: 1px solid rgba(0,245,255,0.1);
  }

  .about-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 80px;
    align-items: center;
    max-width: 1200px;
    margin: 0 auto;
  }

  .about-visual {
    position: relative;
  }

  .about-frame {
    width: 100%;
    aspect-ratio: 3/4;
    background: linear-gradient(135deg, rgba(0,245,255,0.1), rgba(255,0,170,0.05));
    border: 1px solid rgba(0,245,255,0.2);
    position: relative;
    overflow: hidden;
    clip-path: polygon(20px 0, 100% 0, 100% calc(100% - 20px), calc(100% - 20px) 100%, 0 100%, 0 20px);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .about-frame-inner {
    text-align: center;
    padding: 40px;
  }

  .camera-icon {
    font-size: 6rem;
    display: block;
    margin-bottom: 20px;
    filter: drop-shadow(0 0 20px var(--cyan));
    animation: pulse 3s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { filter: drop-shadow(0 0 20px var(--cyan)); }
    50% { filter: drop-shadow(0 0 40px var(--cyan)) drop-shadow(0 0 60px rgba(0,245,255,0.3)); }
  }

  .about-frame::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: linear-gradient(45deg, transparent 30%, rgba(0,245,255,0.05) 50%, transparent 70%);
    animation: shimmer 4s infinite;
  }

  @keyframes shimmer {
    0% { transform: translate(-50%, -50%) rotate(0deg); }
    100% { transform: translate(-50%, -50%) rotate(360deg); }
  }

  .about-corner {
    position: absolute;
    width: 30px;
    height: 30px;
    border-color: var(--cyan);
    border-style: solid;
  }
  .about-corner.tl { top: -2px; left: -2px; border-width: 2px 0 0 2px; box-shadow: -4px -4px 10px rgba(0,245,255,0.3); }
  .about-corner.tr { top: -2px; right: -2px; border-width: 2px 2px 0 0; box-shadow: 4px -4px 10px rgba(0,245,255,0.3); }
  .about-corner.bl { bottom: -2px; left: -2px; border-width: 0 0 2px 2px; box-shadow: -4px 4px 10px rgba(0,245,255,0.3); }
  .about-corner.br { bottom: -2px; right: -2px; border-width: 0 2px 2px 0; box-shadow: 4px 4px 10px rgba(0,245,255,0.3); }

  .about-text p {
    font-size: 1.15rem;
    line-height: 1.9;
    color: rgba(200,220,255,0.8);
    margin-bottom: 24px;
    font-weight: 300;
  }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    margin-top: 40px;
  }

  .stat-box {
    padding: 20px;
    border: 1px solid rgba(0,245,255,0.15);
    background: rgba(0,245,255,0.03);
    text-align: center;
    clip-path: polygon(8px 0, 100% 0, calc(100% - 8px) 100%, 0 100%);
    transition: border-color 0.3s, background 0.3s;
  }

  .stat-box:hover {
    border-color: var(--cyan);
    background: rgba(0,245,255,0.08);
  }

  .stat-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.5rem;
    color: var(--cyan);
    text-shadow: 0 0 20px var(--cyan);
    display: block;
  }

  .stat-label {
    font-size: 0.7rem;
    letter-spacing: 2px;
    color: rgba(180,200,255,0.6);
    text-transform: uppercase;
  }

  /* PORTFOLIO */
  #portfolio {
    max-width: 1400px;
    margin: 0 auto;
    padding: 120px 60px;
  }

  .portfolio-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
  }

  .portfolio-item {
    position: relative;
    aspect-ratio: 16/9;
    background: linear-gradient(135deg, rgba(0,30,50,0.8), rgba(20,0,40,0.8));
    border: 1px solid rgba(0,245,255,0.1);
    overflow: hidden;
    cursor: none;
    transition: border-color 0.3s, transform 0.3s;
    clip-path: polygon(0 0, calc(100% - 15px) 0, 100% 15px, 100% 100%, 15px 100%, 0 calc(100% - 15px));
  }

  .portfolio-item:hover {
    border-color: var(--cyan);
    transform: scale(1.02);
  }

  .portfolio-item.featured {
    grid-column: span 2;
    grid-row: span 1;
    aspect-ratio: 16/7;
  }

  .portfolio-bg {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 4rem;
    transition: transform 0.5s;
  }

  .portfolio-item:hover .portfolio-bg { transform: scale(1.1); }

  .portfolio-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(0deg, rgba(2,2,8,0.9) 0%, transparent 60%);
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 24px;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .portfolio-item:hover .portfolio-overlay { opacity: 1; }

  .portfolio-tag {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.6rem;
    letter-spacing: 3px;
    color: var(--cyan);
    margin-bottom: 6px;
  }

  .portfolio-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem;
    letter-spacing: 2px;
    color: #fff;
  }

  .play-btn {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.8);
    width: 60px;
    height: 60px;
    border: 2px solid rgba(255,255,255,0.5);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.2rem;
    color: rgba(255,255,255,0.7);
    opacity: 0;
    transition: opacity 0.3s, transform 0.3s, border-color 0.3s;
    backdrop-filter: blur(10px);
  }

  .portfolio-item:hover .play-btn {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
    border-color: var(--cyan);
    color: var(--cyan);
    box-shadow: 0 0 20px rgba(0,245,255,0.3);
  }

  /* VIDEO EXAMPLES */
  #videos {
    background: linear-gradient(180deg, rgba(0,245,255,0.02) 0%, transparent 100%);
    border-top: 1px solid rgba(0,245,255,0.1);
    padding: 120px 60px;
  }

  .video-container {
    max-width: 1200px;
    margin: 0 auto;
  }

  .video-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 30px;
  }

  .video-card {
    position: relative;
    background: rgba(0,10,20,0.8);
    border: 1px solid rgba(0,245,255,0.15);
    overflow: hidden;
    clip-path: polygon(15px 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%, 0 15px);
    transition: border-color 0.3s;
  }

  .video-card:hover { border-color: var(--cyan); }

  .video-placeholder {
    aspect-ratio: 16/9;
    background: linear-gradient(135deg, rgba(0,30,60,0.9), rgba(30,0,60,0.9));
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  .video-placeholder::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      repeating-linear-gradient(
        -45deg,
        transparent,
        transparent 10px,
        rgba(0,245,255,0.02) 10px,
        rgba(0,245,255,0.02) 20px
      );
  }

  .video-icon { font-size: 3rem; margin-bottom: 12px; filter: drop-shadow(0 0 15px var(--cyan)); }
  .video-dur {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.65rem;
    letter-spacing: 3px;
    color: var(--cyan);
    padding: 4px 12px;
    border: 1px solid rgba(0,245,255,0.3);
  }

  .video-info {
    padding: 20px 24px;
  }

  .video-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.3rem;
    letter-spacing: 2px;
    color: #fff;
    margin-bottom: 6px;
  }

  .video-desc {
    font-size: 0.85rem;
    color: rgba(180,200,255,0.6);
    letter-spacing: 1px;
  }

  /* SERVICES */
  #services {
    max-width: 1200px;
    margin: 0 auto;
    padding: 120px 60px;
  }

  .services-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 24px;
  }

  .service-card {
    padding: 40px 30px;
    border: 1px solid rgba(0,245,255,0.12);
    background: rgba(0,245,255,0.02);
    position: relative;
    transition: border-color 0.4s, background 0.4s, transform 0.3s;
    clip-path: polygon(0 0, calc(100% - 20px) 0, 100% 20px, 100% 100%, 20px 100%, 0 calc(100% - 20px));
    overflow: hidden;
  }

  .service-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(0,245,255,0.05) 0%, transparent 60%);
    opacity: 0;
    transition: opacity 0.4s;
  }

  .service-card:hover {
    border-color: var(--cyan);
    background: rgba(0,245,255,0.04);
    transform: translateY(-4px);
  }

  .service-card:hover::before { opacity: 1; }

  .service-card.featured {
    border-color: var(--gold);
    background: rgba(255,215,0,0.03);
  }

  .service-card.featured::before {
    background: linear-gradient(135deg, rgba(255,215,0,0.06) 0%, transparent 60%);
    opacity: 1;
  }

  .service-badge {
    position: absolute;
    top: 16px;
    right: 16px;
    font-family: 'Orbitron', sans-serif;
    font-size: 0.55rem;
    letter-spacing: 2px;
    color: var(--gold);
    padding: 4px 10px;
    border: 1px solid var(--gold);
    background: rgba(255,215,0,0.1);
  }

  .service-icon {
    font-size: 2.5rem;
    margin-bottom: 20px;
    display: block;
    filter: drop-shadow(0 0 10px var(--cyan));
  }

  .service-card.featured .service-icon {
    filter: drop-shadow(0 0 10px var(--gold));
  }

  .service-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem;
    letter-spacing: 2px;
    color: #fff;
    margin-bottom: 12px;
  }

  .service-desc {
    font-size: 0.9rem;
    line-height: 1.7;
    color: rgba(180,200,255,0.65);
    margin-bottom: 24px;
    font-weight: 300;
  }

  .service-price {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--cyan);
    text-shadow: 0 0 15px rgba(0,245,255,0.4);
  }

  .service-card.featured .service-price {
    color: var(--gold);
    text-shadow: 0 0 15px rgba(255,215,0,0.4);
  }

  .service-features {
    list-style: none;
    margin-top: 20px;
  }

  .service-features li {
    font-size: 0.85rem;
    color: rgba(180,200,255,0.7);
    padding: 6px 0;
    border-bottom: 1px solid rgba(0,245,255,0.06);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .service-features li::before {
    content: '▶';
    font-size: 0.5rem;
    color: var(--cyan);
  }

  /* INSTAGRAM */
  #instagram {
    background: linear-gradient(180deg, transparent, rgba(255,0,170,0.03), transparent);
    border-top: 1px solid rgba(255,0,170,0.1);
